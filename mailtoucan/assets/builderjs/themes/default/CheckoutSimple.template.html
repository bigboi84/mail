<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    .checkout-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: #333;
        background: #f5f5f5;
    }

    .checkout-form {
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .checkout-header {
        padding: 16px 24px;
        background: #f8f9fa;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: #666;
    }

    .checkout-header-icon {
        width: 20px;
        height: 20px;
    }

    .section {
        padding: 32px 24px;
        border-bottom: 1px solid #e0e0e0;
    }

    .section:last-child {
        border-bottom: none;
    }

    .section-title {
        font-size: 16px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 20px;
        letter-spacing: 0.3px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
    }

    .form-row.full-width {
        grid-template-columns: 1fr;
    }

    .form-group {
        position: relative;
    }

    .form-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #555;
        margin-bottom: 8px;
    }

    .form-input {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid #c5c5c5;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        color: #333;
        background: #fff;
        transition: all 0.2s ease;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
    }

    .form-input:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
    }

    .form-input::placeholder {
        color: #aaa;
    }

    .phone-input-wrapper {
        display: flex;
        gap: 8px;
    }

    .phone-flag {
        width: 70px;
        flex-shrink: 0;
        padding: 12px 14px;
        border: 1px solid #d0d0d0;
        border-radius: 4px;
        background: #fff;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .phone-flag:hover {
        border-color: #4a90e2;
    }

    .phone-flag img {
        width: 20px;
        height: 14px;
        object-fit: cover;
    }

    .phone-flag-arrow {
        font-size: 10px;
        color: #666;
        margin-left: auto;
    }

    .phone-input {
        flex: 1;
    }

    .footer-notice {
        text-align: center;
        padding: 24px;
        font-size: 12px;
        color: #999;
        background: #f8f9fa;
    }

    .submit-button {
        width: 100%;
        padding: 16px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: #4a90e2;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 24px;
    }

    .submit-button:hover {
        background: #357abd;
    }

    .submit-button:active {
        transform: translateY(1px);
    }
</style>

<div class="checkout-container">
    <div class="checkout-form">
        <!-- Header -->
        <div class="checkout-header">
            <svg class="checkout-header-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
            </svg>
            <span><%- values.headerTitle %></span>
        </div>

        <!-- Contact Information Section -->
        <section class="section">
            <h2 class="section-title"><%- values.headlines.contact %></h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label"><%- values.contactLabels.firstName %></label>
                    <input type="text" class="form-input" placeholder="<%- values.contactLabels.firstName %>">
                </div>
                <div class="form-group">
                    <label class="form-label"><%- values.contactLabels.lastName %></label>
                    <input type="text" class="form-input" placeholder="<%- values.contactLabels.lastName %>">
                </div>
            </div>

            <div class="form-row full-width">
                <div class="form-group">
                    <label class="form-label"><%- values.contactLabels.email %></label>
                    <input type="email" class="form-input" placeholder="<%- values.contactLabels.email %>">
                </div>
            </div>

            <div class="form-row full-width">
                <div class="form-group">
                    <label class="form-label"><%- values.contactLabels.phone %></label>
                    <div class="phone-input-wrapper">
                        <div class="phone-flag">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 20'%3E%3Crect fill='%23da251d' width='30' height='20'/%3E%3Cpolygon fill='%23ff0' points='15,4 11.47,14.85 20.71,8.15 9.29,8.15 18.53,14.85'/%3E%3C/svg%3E" alt="VN">
                            <span class="phone-flag-arrow">▼</span>
                        </div>
                        <input type="tel" class="form-input phone-input" placeholder="<%- values.contactLabels.phone %>">
                    </div>
                </div>
            </div>

            <button class="submit-button"><%- values.buttonTexts.submit %></button>
        </section>

        <!-- Footer Notice -->
        <div class="footer-notice">
            <%- values.headlines.privacy %>
        </div>
    </div>
</div>
