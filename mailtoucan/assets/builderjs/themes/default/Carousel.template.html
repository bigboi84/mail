<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= page_title %></title>

    <style>
        html {
            margin: 0;
        }
        body {
            padding: 0;
            margin: 0;
            font-family: <%= (typeof formats !== 'undefined' && formats && formats.font_family) ? formats.font_family : 'Arial, Helvetica, sans-serif' %>;
            line-height: 1.4;
        }
        p, h1, h2, h3, h4, h5, h6, label, ul {
            margin: 0;
        }
        a {
            color: inherit;
        }
        [builder-element="PageElement"] {
            min-height: 100vh;
            display: <%= (typeof formats !== 'undefined' && formats && formats.display) ? formats.display : ((typeof display !== 'undefined' && display) ? display : 'block') %>;
            flex-direction: <%= (typeof formats !== 'undefined' && formats && formats.flex_direction) ? formats.flex_direction : ((typeof flex_direction !== 'undefined' && flex_direction) ? flex_direction : '') %>;
            justify-content: <%= (typeof formats !== 'undefined' && formats && formats.justify_content) ? formats.justify_content : ((typeof justify_content !== 'undefined' && justify_content) ? justify_content : '') %>;
            align-items: <%= (typeof formats !== 'undefined' && formats && (formats.align_items || formats.align)) ? (formats.align_items || formats.align) : ((typeof align_items !== 'undefined' && align_items) ? align_items : '') %>;
        }

        [builder-element="PageElement"] > [builder-element="BlockElement"] > :first-child {
            padding-top: <%= (typeof block_padding_top !== 'undefined') ? block_padding_top : 0 %>px;
            padding-right: <%= (typeof block_padding_right !== 'undefined') ? block_padding_right : 0 %>px;
            padding-bottom: <%= (typeof block_padding_bottom !== 'undefined') ? block_padding_bottom : 0 %>px;
            padding-left: <%= (typeof block_padding_left !== 'undefined') ? block_padding_left : 0 %>px;
        }

        [builder-element="PageElement"] {
            display: flex;
        }

        [builder-element="PageElement"] > [builder-element="BlockElement"] {
            width: 600px;
            min-width: 600px;
        }
    </style>
</head>
<body>
    <%- page %>
</body>
</html>
