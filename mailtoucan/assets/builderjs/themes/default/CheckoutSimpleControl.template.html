<div class="checkout-control-panel">
    <!-- UI Settings Section -->
    <div class="py-3 px-3 border-bottom">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-uppercase text-muted">UI Settings</label>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold small">Preview Label</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.ui.previewLabel %>" 
                   data-path="ui.previewLabel">
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold small">Mode Label</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.ui.modeLabel %>" 
                   data-path="ui.modeLabel">
        </div>
    </div>

    <!-- Header Section -->
    <div class="py-3 px-3 border-bottom">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-uppercase text-muted">Header</label>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold small">Header Title</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.headerTitle %>" 
                   data-path="headerTitle">
        </div>
    </div>

    <!-- Button Texts Section -->
    <div class="py-3 px-3 border-bottom">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-uppercase text-muted">Button Texts</label>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold small">Submit Button Text</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.buttonTexts.submit %>" 
                   data-path="buttonTexts.submit">
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold small">Submitting Text</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.buttonTexts.submitting %>" 
                   data-path="buttonTexts.submitting">
        </div>
    </div>

    <!-- Headlines Section -->
    <div class="py-3 px-3 border-bottom">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-uppercase text-muted">Section Headlines</label>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold small">Contact Information Headline</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.headlines.contact %>" 
                   data-path="headlines.contact">
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold small">Privacy Notice</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.headlines.privacy %>" 
                   data-path="headlines.privacy">
        </div>
    </div>

    <!-- Contact Input Labels Section -->
    <div class="py-3 px-3 border-bottom">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-uppercase text-muted">Contact Input Labels</label>
        </div>
        
        <div class="row g-2">
            <div class="col-6">
                <label class="form-label fw-semibold small">First Name</label>
                <input type="text" class="form-control form-control-sm" 
                       value="<%= values.contactLabels.firstName %>" 
                       data-path="contactLabels.firstName">
            </div>
            <div class="col-6">
                <label class="form-label fw-semibold small">Last Name</label>
                <input type="text" class="form-control form-control-sm" 
                       value="<%= values.contactLabels.lastName %>" 
                       data-path="contactLabels.lastName">
            </div>
        </div>
        
        <div class="mb-3 mt-2">
            <label class="form-label fw-semibold small">Email</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.contactLabels.email %>" 
                   data-path="contactLabels.email">
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold small">Phone Number</label>
            <input type="text" class="form-control form-control-sm" 
                   value="<%= values.contactLabels.phone %>" 
                   data-path="contactLabels.phone">
        </div>
    </div>
</div>

<style>
    .checkout-control-panel {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    .checkout-control-panel .form-label {
        margin-bottom: 0.25rem;
        font-size: 0.875rem;
    }
    
    .checkout-control-panel .form-control-sm {
        font-size: 0.875rem;
        padding: 0.375rem 0.75rem;
    }
    
    .checkout-control-panel .border-bottom {
        border-bottom: 1px solid #dee2e6;
    }
    
    .checkout-control-panel .text-muted {
        color: #6c757d;
    }
    
    .checkout-control-panel .text-uppercase {
        text-transform: uppercase;
    }
    
    .checkout-control-panel .fw-semibold {
        font-weight: 600;
    }
    
    .checkout-control-panel .small {
        font-size: 0.75rem;
    }
    
    .checkout-control-panel .py-3 {
        padding-top: 1rem;
        padding-bottom: 1rem;
    }
    
    .checkout-control-panel .px-3 {
        padding-left: 1rem;
        padding-right: 1rem;
    }
    
    .checkout-control-panel .mb-3 {
        margin-bottom: 1rem;
    }
    
    .checkout-control-panel .mt-2 {
        margin-top: 0.5rem;
    }
    
    .checkout-control-panel .row {
        display: flex;
        flex-wrap: wrap;
        margin-right: -0.5rem;
        margin-left: -0.5rem;
    }
    
    .checkout-control-panel .g-2 > * {
        padding-right: 0.5rem;
        padding-left: 0.5rem;
    }
    
    .checkout-control-panel .col-6 {
        flex: 0 0 50%;
        max-width: 50%;
    }
    
    .checkout-control-panel .form-control {
        display: block;
        width: 100%;
        border: 1px solid #ced4da;
        border-radius: 0.25rem;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    
    .checkout-control-panel .form-control:focus {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }
</style>
